<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний Линкүүд - Тохиргоотой Загвар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .icon-option.active {
            border-color: #2563eb;
            background-color: #eff6ff;
            color: #2563eb;
        }
        .card-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-overlay {
            transition: all 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.95) translateY(-20px);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-24 px-4">
    
    <!-- Floating Action Buttons Container -->
    <div class="fixed top-6 left-6 flex flex-col gap-3 z-40">
        <!-- Add Link Button -->
        <button id="openModalBtn" title="Линк нэмэх" class="w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg shadow-blue-200 flex items-center justify-center transition-all hover:scale-110">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <!-- Settings Button -->
        <button id="openSettingsBtn" title="Сайтын тохиргоо" class="w-14 h-14 bg-white hover:bg-slate-50 text-slate-600 rounded-full shadow-lg border border-slate-100 flex items-center justify-center transition-all hover:scale-110">
            <i class="fas fa-cog text-xl"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- Dynamic Header -->
        <header id="siteHeader" class="text-center mb-12 flex flex-col items-center justify-center">
            <div id="siteLogoContainer" class="hidden mb-4">
                <img id="headerLogo" src="" alt="Logo" class="h-16 w-16 object-contain rounded-xl shadow-sm border border-slate-100 bg-white p-1">
            </div>
            <h1 id="headerTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight">Миний Холбоосууд</h1>
            <p id="authStatus" class="text-slate-400 text-[10px] mt-2 font-medium tracking-widest uppercase">Холбогдож байна...</p>
        </header>

        <!-- Grid -->
        <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Cards will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20 opacity-30">
            <i class="fas fa-layer-group text-4xl mb-3"></i>
            <p class="text-sm font-medium">Одоогоор карт байхгүй байна.</p>
        </div>
    </div>

    <!-- Link Modal -->
    <div id="modalOverlay" class="modal-overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                <i class="fas fa-times"></i>
            </button>
            <div class="p-8">
                <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-blue-600"></i>
                    Шинэ холбоос нэмэх
                </h2>
                <div class="space-y-4">
                    <input type="url" id="urlInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all" placeholder="Вэб холбоос (https://...)">
                    <input type="text" id="nameInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all" placeholder="Нэр / Гарчиг">
                    <textarea id="descInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm h-24 resize-none" placeholder="Товч тайлбар..."></textarea>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Icon сонгох</label>
                        <div id="iconPicker" class="flex flex-wrap gap-2"></div>
                    </div>
                    <button id="addBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
                        <i id="addIcon" class="fas fa-check"></i>
                        <div id="addLoader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full loader"></div>
                        <span>Хадгалах</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsOverlay" class="modal-overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden relative">
            <button id="closeSettingsBtn" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                <i class="fas fa-times"></i>
            </button>
            <div class="p-8">
                <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                    <i class="fas fa-cog text-slate-600"></i>
                    Сайтын тохиргоо
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">Сайтын нэр</label>
                        <input type="text" id="siteNameInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all" placeholder="Жишээ: Миний блог">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">Логоны URL</label>
                        <input type="url" id="siteLogoInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all" placeholder="https://image.com/logo.png">
                    </div>
                    <button id="saveSettingsBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
                        <span>Хадгалах</span>
                        <div id="settingsLoader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full loader"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Vercel/GitHub дээр ажиллахад зориулсан тохиргоо
        // Хэрэв та Canvas-аас гадна ажиллуулж байгаа бол өөрийн Firebase төслийн мэдээллийг доорх object-д хуулж тавина уу.
        let firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Canvas орчны хувьсагчдыг шалгаж авах
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.log("Canvas config not found, using manual config.");
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // App ID шалгалт
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-awesome-links-app';

        let currentUser = null;
        const linksCollection = collection(db, 'artifacts', appId, 'public', 'data', 'links');
        const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'siteSettings');

        const icons = [
            'fa-link', 'fa-globe', 'fa-code', 'fa-video', 
            'fa-music', 'fa-book', 'fa-briefcase', 'fa-user', 
            'fa-gamepad', 'fa-shopping-cart', 'fa-heart', 'fa-star'
        ];
        let selectedIcon = 'fa-link';

        // Elements
        const cardsGrid = document.getElementById('cardsGrid');
        const emptyState = document.getElementById('emptyState');
        const modalOverlay = document.getElementById('modalOverlay');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const openModalBtn = document.getElementById('openModalBtn');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const addBtn = document.getElementById('addBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const headerTitle = document.getElementById('headerTitle');
        const headerLogo = document.getElementById('headerLogo');
        const siteLogoContainer = document.getElementById('siteLogoContainer');

        // Init Icons
        const iconPicker = document.getElementById('iconPicker');
        icons.forEach(icon => {
            const btn = document.createElement('button');
            btn.className = `icon-option w-10 h-10 flex items-center justify-center border-2 border-slate-100 rounded-xl text-slate-400 hover:border-blue-200 transition-all ${icon === selectedIcon ? 'active' : ''}`;
            btn.innerHTML = `<i class="fas ${icon}"></i>`;
            btn.onclick = () => {
                document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedIcon = icon;
            };
            iconPicker.appendChild(btn);
        });

        // Authentication (Rule 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Authentication failed. Make sure Firestore rules allow anonymous access or provide valid config.", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authStatus').innerText = "Клоуд холболт идэвхтэй";
                startListening();
            } else {
                document.getElementById('authStatus').innerText = "Нэвтрээгүй байна";
            }
        });

        initAuth();

        // Listeners
        function startListening() {
            if (!currentUser) return;
            
            // Listen to Links
            onSnapshot(linksCollection, (snapshot) => {
                cardsGrid.innerHTML = '';
                const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                if (docs.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    docs.forEach(data => {
                        const card = createCardElement(data);
                        cardsGrid.appendChild(card);
                    });
                }
            }, (error) => console.error("Firestore links error:", error));

            // Listen to Site Settings
            onSnapshot(configDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    headerTitle.innerText = data.siteName || "Миний Холбоосууд";
                    document.getElementById('siteNameInput').value = data.siteName || "";
                    document.getElementById('siteLogoInput').value = data.siteLogo || "";
                    
                    if (data.siteLogo) {
                        headerLogo.src = data.siteLogo;
                        siteLogoContainer.classList.remove('hidden');
                    } else {
                        siteLogoContainer.classList.add('hidden');
                    }
                }
            }, (error) => console.error("Firestore config error:", error));
        }

        // Action Handlers
        openModalBtn.onclick = () => modalOverlay.classList.add('active');
        closeModalBtn.onclick = () => {
            modalOverlay.classList.remove('active');
            document.getElementById('urlInput').value = '';
            document.getElementById('nameInput').value = '';
            document.getElementById('descInput').value = '';
        };

        openSettingsBtn.onclick = () => settingsOverlay.classList.add('active');
        closeSettingsBtn.onclick = () => settingsOverlay.classList.remove('active');

        addBtn.onclick = async () => {
            if (!currentUser) {
                alert("Холболт амжилтгүй. Түр хүлээнэ үү.");
                return;
            }
            const url = document.getElementById('urlInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const desc = document.getElementById('descInput').value.trim();

            if (!url) return;
            
            document.getElementById('addLoader').classList.remove('hidden');
            document.getElementById('addIcon').classList.add('hidden');

            try {
                await addDoc(linksCollection, {
                    url,
                    title: name || "Нэргүй холбоос",
                    desc: desc || "",
                    iconClass: selectedIcon,
                    createdAt: serverTimestamp(),
                    userId: currentUser.uid
                });
                modalOverlay.classList.remove('active');
                document.getElementById('urlInput').value = '';
                document.getElementById('nameInput').value = '';
                document.getElementById('descInput').value = '';
            } catch (err) { console.error("Save error:", err); }
            finally {
                document.getElementById('addLoader').classList.add('hidden');
                document.getElementById('addIcon').classList.remove('hidden');
            }
        };

        saveSettingsBtn.onclick = async () => {
            if (!currentUser) return;
            const siteName = document.getElementById('siteNameInput').value.trim();
            const siteLogo = document.getElementById('siteLogoInput').value.trim();

            document.getElementById('settingsLoader').classList.remove('hidden');
            try {
                await setDoc(configDocRef, {
                    siteName,
                    siteLogo,
                    updatedAt: serverTimestamp()
                });
                settingsOverlay.classList.remove('active');
            } catch (err) { console.error("Settings save error:", err); }
            finally {
                document.getElementById('settingsLoader').classList.add('hidden');
            }
        };

        window.toggleEdit = async (id) => {
            const view = document.getElementById(`view-mode-${id}`);
            const edit = document.getElementById(`edit-mode-${id}`);
            const btn = document.getElementById(`edit-btn-${id}`);
            if (!view.classList.contains('hidden')) {
                view.classList.add('hidden');
                edit.classList.remove('hidden');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                btn.classList.add('bg-blue-600', 'text-white');
            } else {
                const newTitle = document.getElementById(`edit-title-${id}`).value;
                const newDesc = document.getElementById(`edit-desc-${id}`).value;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'links', id), {
                        title: newTitle, desc: newDesc
                    });
                } catch (e) { console.error("Update error:", e); }
            }
        };

        window.updateIcon = async (id, iconClass) => {
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'links', id), { iconClass });
            } catch (e) { console.error("Icon update error:", e); }
        };

        window.deleteCard = async (id) => {
            if (confirm("Устгах уу?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'links', id));
                } catch (e) { console.error("Delete error:", e); }
            }
        };

        function createCardElement(data) {
            const card = document.createElement('div');
            card.id = `card-${data.id}`;
            card.className = 'bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex gap-4 items-start card-enter relative group hover:border-blue-100 transition-all duration-300';
            card.innerHTML = `
                <div class="w-14 h-14 shrink-0 rounded-2xl bg-slate-50 flex items-center justify-center text-blue-600 text-xl border border-slate-100">
                    <i class="fas ${data.iconClass}"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div id="view-mode-${data.id}">
                        <h3 id="title-${data.id}" class="font-bold text-slate-900 truncate pr-8">${data.title}</h3>
                        <p class="text-slate-500 text-xs mt-1 line-clamp-2 leading-relaxed">${data.desc || 'Тайлбар байхгүй'}</p>
                        <a href="${data.url}" target="_blank" class="inline-block mt-3 text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:text-blue-700">Вэб рүү очих →</a>
                    </div>
                    <div id="edit-mode-${data.id}" class="hidden space-y-2 pr-4">
                        <input type="text" id="edit-title-${data.id}" value="${data.title}" class="w-full text-xs font-bold border rounded-lg px-2 py-1 outline-none">
                        <textarea id="edit-desc-${data.id}" class="w-full text-[10px] border rounded-lg px-2 py-1 outline-none h-16">${data.desc}</textarea>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${icons.map(ic => `<button onclick="updateIcon('${data.id}', '${ic}')" class="w-6 h-6 rounded bg-slate-100 text-[10px] hover:bg-blue-100 ${ic === data.iconClass ? 'ring-1 ring-blue-500' : ''}"><i class="fas ${ic}"></i></button>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="toggleEdit('${data.id}')" id="edit-btn-${data.id}" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:text-blue-600 flex items-center justify-center text-xs"><i class="fas fa-pen"></i></button>
                    <button onclick="deleteCard('${data.id}')" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:text-red-600 flex items-center justify-center text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `;
            return card;
        }
    </script>
</body>
</html>
